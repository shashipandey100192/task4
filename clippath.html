<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
<style>
    *
    {
        margin:0 auto;
        padding:0;
    }
    .page
    {
        border:1px solid red;
        width:1200px;
        height: 500px;
        background-image:url('../images/10.jpg');
        background-repeat: no-repeat;
        background-size: 100% 100%;
        /* clip-path: polygon(0px 0px,600px 100px,1200px 0px,1200px 500px,0px 500px); */
        clip-path: polygon(0px 0px,600px 100px,1200px 0px,1200px 400px,600px 500px, 0px 400px);
        /* clip-path: polygon(49% 7%, 99% 0, 100% 44%, 85% 100%, 20% 100%, 0% 60%, 0 0); */

    }
    .mt{
        margin-top:-100px;
    }
    .bg
    {
        background-image: url(../images/beautiful-3vau5vtfa3qn7k8v.jpg);
    }
    .offer
    {
        width:600px;
        height: 100px;
        background-color: aqua;
        color:white;
        text-align: center;
        position: relative;
        z-index: 4;
        margin-top:-100px;
        /* margin:-100px 0 0 400px; */
        /* border-radius: 50px; */
        border-top-left-radius: 50px;
        border-bottom-right-radius: 50px;
    }

    body
    {
        filter:grayscale(50%) blur(2px);
    }
</style>
</head>
<body>


<div class="page"> 
    <h1>Home page</h1>
</div>

<div class="offer"> this is offer page</div>

<div class="page mt bg"> 
    <h1>Home page</h1>
</div>




    
</body>
</html>
