<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Document</title>
</head>
<body>

<form>
<table align="center" border="1" bgcolor="tomato">
<tr>
	<td> Roll No: </td>
	<td> <input type="text" placeholder="roll no" size="48" autofocus accesskey="n"></td>
</tr>
<tr>
	<td> email Id: </td>
	<td> <input type="email" placeholder="enter email" size="48" required></td>
</tr>
<tr>
	<td> Phone No </td>
	<td> <input type="text" placeholder="phone no" size="48" required pattern="[0-9]{10}"></td>
</tr>

<tr>
	<td> Student Name: </td>
	<td>
		 <input type="text" placeholder="first" accesskey="u"> -
		 <input type="text" placeholder="last">
	</td>
</tr>

<tr>
	<td>gender</td>
	<td>
			Male<input type="radio" name="g">
			Female<input type="radio" name="g">
	</td>

</tr>

<tr>
	<td>Department</td>
	<td>
			HTML<input type="checkbox" checked>
			css<input type="checkbox">
	</td>
</tr>


<tr>
	<td> Photo Upload</td>
	<td>
		<input type="file">
	</td>
</tr>

<tr>
	<td colspan="2" align="center">
		<input type="submit" value="submit">
		<input type="reset" value="cancel">
	</td>
</tr>

</table>
</form>

	
</body>
</html>
